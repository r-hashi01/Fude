<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>pty-terminal</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }
    header {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #8884;
      align-items: center;
      font-size: 13px;
      flex-wrap: wrap;
    }
    #cwd { flex: 1; min-width: 100px; font-family: ui-monospace, monospace; opacity: 0.7; }
    button, input, select {
      font: inherit;
      padding: 5px 9px;
      border: 1px solid #8888;
      border-radius: 4px;
      background: transparent;
      color: inherit;
    }
    button { cursor: pointer; }
    button:hover:not(:disabled) { background: #8882; }
    button:disabled { opacity: 0.4; cursor: default; }

    #term {
      overflow-y: auto;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      background: #1114;
    }

    form {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #8884;
    }
    form input {
      flex: 1;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <header>
    <button id="choose">Choose folder…</button>
    <span id="cwd">no folder</span>
    <select id="tool">
      <option value="bash">bash</option>
      <option value="claude">claude</option>
      <option value="codex">codex</option>
    </select>
    <button id="spawn" disabled>Spawn</button>
    <button id="kill" disabled>Kill</button>
  </header>

  <div id="term"></div>

  <form id="send-form">
    <input id="input" autocomplete="off" placeholder="session not running" disabled />
    <button id="send" disabled>Send</button>
  </form>

  <script>
    const listen = window.__shell_listen;
    const term = document.getElementById("term");
    const cwdEl = document.getElementById("cwd");
    const spawnBtn = document.getElementById("spawn");
    const killBtn = document.getElementById("kill");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    let cwd = null;
    let sessionId = null;

    // Strip the most common ANSI escape sequences so CLI output is readable
    // without a full terminal emulator. Good enough for demonstrating the
    // PTY byte pipe; swap in xterm.js for real use.
    const ANSI = /\x1b\[[0-9;?]*[ -/]*[@-~]|\x1b[()][A-Z0-9]|\x1b[=>]|\r/g;

    function append(s) {
      const clean = s.replace(ANSI, "");
      term.appendChild(document.createTextNode(clean));
      term.scrollTop = term.scrollHeight;
    }

    function b64decode(s) {
      const bin = atob(s);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    }

    listen("pty:data", ({ id, data }) => {
      if (id !== sessionId) return;
      append(b64decode(data));
    });

    listen("pty:exit", ({ id }) => {
      if (id !== sessionId) return;
      append("\n[process exited]\n");
      sessionId = null;
      killBtn.disabled = true;
      sendBtn.disabled = true;
      input.disabled = true;
      spawnBtn.disabled = !cwd;
    });

    document.getElementById("choose").onclick = async () => {
      const picked = await window.__shell_ipc("dialog_open", { directory: true });
      if (!picked) return;
      await window.__shell_ipc("allow_dir", { path: picked });
      cwd = picked;
      cwdEl.textContent = picked;
      spawnBtn.disabled = false;
    };

    spawnBtn.onclick = async () => {
      const tool = document.getElementById("tool").value;
      spawnBtn.disabled = true;
      try {
        sessionId = await window.__shell_ipc("pty_spawn", { tool, cwd, cols: 80, rows: 24 });
        append(`[spawned ${tool} as session ${sessionId}]\n`);
        killBtn.disabled = false;
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      } catch (e) {
        append(`[spawn failed: ${e.message || e}]\n`);
        spawnBtn.disabled = false;
      }
    };

    killBtn.onclick = async () => {
      if (sessionId == null) return;
      await window.__shell_ipc("pty_kill", { id: sessionId });
    };

    document.getElementById("send-form").onsubmit = async (e) => {
      e.preventDefault();
      if (sessionId == null) return;
      const line = input.value + "\n";
      input.value = "";
      await window.__shell_ipc("pty_write", { id: sessionId, data: line });
    };
  </script>
</body>
</html>
