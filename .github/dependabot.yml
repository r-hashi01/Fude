version: 2
updates:
  # Rust crates. Weekly cadence; review before merging to respect the
  # 14-day supply-chain quarantine (see CLAUDE.md). Major bumps are a
  # human decision — they often carry breaking API changes (e.g. wry,
  # tao, rfd) that require code updates in fude itself.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      patch-updates:
        update-types:
          - patch
      minor-updates:
        update-types:
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions. Pinned to commit SHAs, so this auto-bumps them with
  # a commit message referencing the version. Major bumps blocked too:
  # action majors sometimes change inputs / outputs.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
